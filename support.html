<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support — Clara</title>
<meta name="description" content="Need a hand with Clara? Get in touch — we're here to help.">
<link rel="icon" type="image/png" href="clara-small.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F1E7;
    --cream-deep: #EFE9DB;
    --card: #FFFFFF;
    --ink: #2E2A26;
    --btn: #2A2724;
    --muted: #8A8478;
    --line: #E7E0D2;
    --shadow: 0 10px 28px rgba(58, 50, 40, 0.09);
    --shadow-lift: 0 16px 36px rgba(58, 50, 40, 0.13);
    --r-pill: 999px;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 17px;
    line-height: 1.55;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  h1, h2, h3 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.06;
  }

  img { display: block; max-width: 100%; }
  a { color: inherit; }

  /* ---------- nav ---------- */
  nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(245, 241, 231, 0.88);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(231, 224, 210, 0.6);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; max-width: 1060px; margin: 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .brand img { width: 34px; height: 34px; }
  .brand span {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800; font-size: 1.35rem; letter-spacing: -0.02em;
  }
  .nav-cta {
    background: var(--btn); color: #FFF; text-decoration: none;
    font-weight: 700; font-size: 0.92rem;
    padding: 10px 20px; border-radius: var(--r-pill);
    transition: transform 0.15s ease;
  }
  .nav-cta:hover { transform: scale(1.04); }
  .nav-cta:active { transform: scale(0.97); }

  /* ---------- speech bubble ---------- */
  .bubble {
    display: inline-block;
    background: var(--card);
    border-radius: var(--r-pill);
    padding: 11px 22px;
    font-weight: 700; font-size: 1.02rem;
    box-shadow: var(--shadow);
    position: relative;
  }
  .bubble::after {
    content: "";
    position: absolute; left: 50%; top: -7px;
    transform: translateX(-50%) rotate(45deg);
    width: 14px; height: 14px;
    background: var(--card);
    border-radius: 3px;
  }

  /* ---------- placeholder content ---------- */
  main {
    flex: 1;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    padding: 80px 24px 96px;
  }
  main img.clara {
    width: min(200px, 46vw);
    margin: 0 auto 22px;
    animation: drop-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes drop-in {
    from { transform: translateY(-26px) scale(0.92); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  main .bubble { margin-bottom: 34px; }
  main h1 {
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    max-width: 640px; margin: 0 auto 16px;
  }
  main p.sub {
    font-size: clamp(1.05rem, 2.4vw, 1.2rem);
    color: var(--muted); font-weight: 500;
    max-width: 500px; margin: 0 auto 34px;
  }
  .home-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--btn); color: #FFF; text-decoration: none;
    font-weight: 700; font-size: 0.98rem;
    padding: 14px 26px; border-radius: var(--r-pill);
    box-shadow: var(--shadow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .home-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: var(--shadow-lift); }
  .home-btn:active { transform: scale(0.97); }
  .back-link { margin-top: 18px; color: var(--muted); font-weight: 600; font-size: 0.92rem; text-decoration: none; transition: color 0.15s ease; }
  .back-link:hover { color: var(--ink); }

  /* ---------- footer ---------- */
  footer {
    border-top: 1px solid var(--line);
    padding: 36px 24px 44px;
    background: var(--cream-deep);
  }
  .foot-inner {
    max-width: 1060px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    flex-wrap: wrap;
  }
  .foot-brand { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.9rem; font-weight: 500; }
  .foot-brand img { width: 26px; height: 26px; }
  .foot-links { display: flex; gap: 22px; font-size: 0.9rem; font-weight: 600; }
  .foot-links a { text-decoration: none; color: var(--muted); transition: color 0.15s ease; }
  .foot-links a:hover { color: var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition-duration: 0.01s !important; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="brand" href="index.html">
      <img src="clara-small.png" alt="Clara the strawberry">
      <span>Clara</span>
    </a>
    <a class="nav-cta" href="index.html#get">Get the app</a>
  </div>
</nav>

<main>
  <img class="clara" src="clara.png" alt="Clara — a happy cartoon strawberry with big glossy eyes and blush cheeks">
  <div class="bubble">I'm still writing this page&nbsp;🍓</div>
  <h1>Support</h1>
  <p class="sub">A proper help center is on its way. Until then, I'd love to hear from you — reach me directly and I'll get back to you.</p>
  <a class="home-btn" href="mailto:support@scandihouse.co">Email support@scandihouse.co</a>
  <a class="back-link" href="index.html">← Back to home</a>
</main>

<footer>
  <div class="foot-inner">
    <div class="foot-brand">
      <img src="clara-small.png" alt="">
      <span>© 2026 Scandihouse Limited · Limassol, Cyprus</span>
    </div>
    <div class="foot-links">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="support.html">Support</a>
      <a href="mailto:support@scandihouse.co">Contact</a>
    </div>
  </div>
</footer>

</body>
</html>
